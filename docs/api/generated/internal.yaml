components:
  schemas:
    ValidationNode:
      required:
      - level
      - message
      - subnodes
      type: object
      properties:
        level:
          type: string
          enum:
          - ERROR
        message:
          type: string
        subnodes:
          type: array
          items:
            $ref: "#/components/schemas/ValidationNode"
    ValidationTree:
      required:
      - log
      - status
      type: object
      properties:
        status:
          type: string
          enum:
          - FAIL
        log:
          $ref: "#/components/schemas/ValidationNode"
    ResponseSubmissionDraft:
      required:
      - content
      - displayKey
      - key
      - modificationTime
      - newSubmission
      type: object
      properties:
        key:
          type: string
          description: Draft accession number
          example: TMP_2024-09-21T10:12:00.002Z
        displayKey:
          type: string
          description: Human-readable identifier for the draft
          example: S-BSST123
        newSubmission:
          type: boolean
          description: "True if the draft is for a new submission, false if it edits\
            \ an existing one"
        content:
          type: string
          description: Raw page-tab JSON content of the draft
