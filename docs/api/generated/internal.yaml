  /submissions:
    get:
      tags:
      - Submissions
      summary: Search My Submissions
      description: "Search submissions visible to the authenticated user. Results\
        \ are filtered by ownership, superuser permissions, and administrated collections."
      operationId: getSubmissions
      parameters:
      - name: request
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/SubmissionFilterRequest"
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "415":
          description: Unsupported Media Type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubmissionDto"
      security:
      - sessionToken: []
    post:
      tags:
      - Synchronous Submission
      summary: Submit Multipart JSON Synchronously
      description: Submit BioStudies JSON content together with optional files as
        multipart form data and wait for processing to complete.
      operationId: submitTsv
      parameters:
      - name: parameters
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/SubmitParameters"
      - name: Submission_Type
        in: header
        schema:
          type: string
          enum:
          - text/plain
          - application/json
      - name: onBehalf
        in: query
        description: Email of the user the submission is performed on behalf of.
        required: false
        schema:
          type: string
      - name: name
        in: query
        description: Name to use if the on-behalf user needs to be registered.
        required: false
        schema:
          type: string
      - name: register
        in: query
        description: Whether to register an inactive user for the on-behalf email.
        required: false
        schema:
          type: boolean
      - name: Content-Type
        in: header
        schema:
          type: string
          enum:
          - multipart/form-data
      - name: submission
        in: query
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: string
          multipart/form-data:
            schema:
              type: object
              properties:
                onBehalfRequest:
                  $ref: "#/components/schemas/OnBehalfParameters"
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                parameters:
                  $ref: "#/components/schemas/SubmitParameters"
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "415":
          description: Unsupported Media Type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
      security:
      - sessionToken: []
    delete:
      tags:
      - Submission Utilities
      summary: Delete Submissions
      description: Delete multiple submissions the authenticated user is allowed to
        manage.
      operationId: deleteSubmissions
      parameters:
      - name: submissions
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "415":
          description: Unsupported Media Type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Unit"
      security:
      - sessionToken: []
  /submissions/requests/{accNo}/{version}/archive:
