      - reference
      - valueAttrs
      type: object
      properties:
        name:
          type: string
        value:
          type: string
        reference:
          type: boolean
        nameAttrs:
          type: array
          items:
            $ref: "#/components/schemas/ExtAttributeDetail"
        valueAttrs:
          type: array
          items:
            $ref: "#/components/schemas/ExtAttributeDetail"
    ExtAttributeDetail:
