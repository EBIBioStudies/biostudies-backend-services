      security:
      - sessionToken: []
    put:
      tags:
      - Groups
      summary: Add a user to a group
      operationId: addUserInGroup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupRequest"
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "415":
          description: Unsupported Media Type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "200":
          description: OK
      security:
      - sessionToken: []
    post:
      tags:
      - Groups
      summary: Create a group
      operationId: createGroup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupRequest"
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "415":
          description: Unsupported Media Type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserGroupDto"
      security:
