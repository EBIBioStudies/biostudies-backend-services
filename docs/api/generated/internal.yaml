      - fullname
      - orcid
      - secret
      - sessid
      - superuser
      - uploadType
      type: object
      properties:
        sessid:
          type: string
          description: Session token used as `X-Session-Token` header on subsequent
            calls
          example: <auth-token>
        email:
          type: string
          description: User email
          example: user@test.org
        username:
          type: string
          description: User login name
          example: user
        secret:
          type: string
          description: User secret used to derive private upload paths
          example: the-user-secret
        fullname:
          type: string
          description: User full name
          example: Test User
        superuser:
          type: boolean
          description: Whether the user has superuser privileges
          example: true
        orcid:
          type: string
          description: User ORCID identifier
          example: 0000-0001-2345-6789
        allow:
          type: array
          description: Collections the user is allowed to submit to
          example:
          - Public
          items:
            type: string
            description: Collections the user is allowed to submit to
            example: "[\"Public\"]"
        deny:
          type: array
          description: Collections the user is denied submission to
          example: []
          items:
            type: string
            description: Collections the user is denied submission to
            example: "[]"
        uploadType:
          type: string
          description: "Upload storage backend for the user (e.g. NFS, FIRE)"
          example: NFS
      description: Authenticated user's profile and session token.
    RetryActivationRequest:
      required:
      - email
      - instanceKey
      - path
      type: object
      properties:
        email:
          type: string
          description: User email
          example: user@test.org
        instanceKey:
          type: string
          description: Instance key to generate the activation link
          example: the-instance-key
        path:
          type: string
          description: Path to redirect the user in the UI
          example: /users/register
    RegisterRequest:
      required:
      - email
      - name
      - notificationsEnabled
      - password
      type: object
      properties:
        name:
          type: string
          description: User name
          example: Test User
        email:
          type: string
          description: User email
          example: user@test.org
        password:
          type: string
          description: Password for the new account
          example: "123456"
        instanceKey:
          type: string
          description: Instance key that should process the registration
          example: the-instance-key
        path:
          type: string
          description: Path to redirect the user in the UI
          example: /users/register
        orcid:
          type: string
          description: User ORCID identifier
          example: 0000-0001-2345-6789
        notificationsEnabled:
          type: boolean
          description: Whether the new user receives BioStudies notifications. Disabled
            by default.
          example: false
        storageMode:
          type: string
          description: Storage mode for the user's files
          example: NFS
        recaptcha2-response:
          type: string
          description: Re-Captcha validation response
          example: recaptcha-response
    RefreshUserRequest:
      required:
      - email
      type: object
      properties:
        email:
          type: string
    FtpUserFolder:
      required:
      - path
      - relativePath
      - type
      type: object
      allOf:
      - $ref: "#/components/schemas/UserFolder"
    GroupFolder:
      required:
      - groupName
      - path
      type: object
      properties:
        groupName:
          type: string
        path:
          type: object
          properties:
            absolute:
              type: boolean
            fileSystem:
              type: object
              properties:
                open:
                  type: boolean
                readOnly:
                  type: boolean
                separator:
                  type: string
                rootDirectories:
                  type: object
                fileStores:
                  type: object
                userPrincipalLookupService:
                  type: object
            nameCount:
              type: integer
              format: int32
        description:
          type: string
    NfsUserFolder:
      required:
      - path
      - relativePath
      - type
      type: object
      allOf:
      - $ref: "#/components/schemas/UserFolder"
    SecurityPermission:
      required:
      - accessTag
      - accessType
      type: object
      properties:
        accessType:
          type: string
          enum:
          - READ
          - ATTACH
          - UPDATE
          - DELETE
          - DELETE_FILES
          - ADMIN
        accessTag:
          type: string
    SecurityUser:
      required:
      - adminCollections
      - email
      - fullName
      - groupsFolders
      - id
      - notificationsEnabled
      - permissions
      - secret
      - superuser
      - userFolder
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        fullName:
          type: string
        login:
          type: string
        orcid:
          type: string
        secret:
          type: string
        superuser:
          type: boolean
        userFolder:
          oneOf:
          - $ref: "#/components/schemas/FtpUserFolder"
          - $ref: "#/components/schemas/NfsUserFolder"
        groupsFolders:
          type: array
          items:
            $ref: "#/components/schemas/GroupFolder"
        permissions:
          uniqueItems: true
          type: array
          items:
            $ref: "#/components/schemas/SecurityPermission"
        adminCollections:
          type: array
          items:
            type: string
        notificationsEnabled:
          type: boolean
    UserFolder:
      required:
      - path
      - relativePath
      - type
      type: object
      properties:
        relativePath:
          type: object
          properties:
            absolute:
              type: boolean
            fileSystem:
              type: object
              properties:
                open:
                  type: boolean
                readOnly:
                  type: boolean
                separator:
                  type: string
                rootDirectories:
                  type: object
                fileStores:
                  type: object
                userPrincipalLookupService:
                  type: object
            nameCount:
              type: integer
              format: int32
        type:
          type: string
        path:
          type: object
          properties:
            absolute:
              type: boolean
            fileSystem:
              type: object
              properties:
                open:
                  type: boolean
                readOnly:
                  type: boolean
                separator:
                  type: string
                rootDirectories:
                  type: object
                fileStores:
                  type: object
                userPrincipalLookupService:
                  type: object
            nameCount:
              type: integer
              format: int32
    ChangePasswordRequest:
      required:
