openapi: 3.0.1
info:
  title: BioStudies API
  description: "BioStudies submission backend. The `internal` group documents every\
    \ endpoint (operational tooling, refresh, FTP, releaser). The `public` group is\
    \ the subset intended for external submitters."
  version: 1.0.0
servers:
- url: http://biostudies-prod.ebi.ac.uk:8788
  description: PROD
- url: http://biostudies-beta.ebi.ac.uk:8788
  description: BETA
- url: http://biostudies-dev.ebi.ac.uk:8788
  description: DEV
tags:
- name: Submission Drafts
  description: "Create, list, update and submit submission drafts."
- name: Security
  description: "User registration, authentication and account management."
paths:
  /submissions/drafts/{accNo}:
    get:
      tags:
      - Submission Drafts
      summary: Get Submission Draft
      description: "Get the submission draft with the specified accNo, creating one\
        \ if it does not exist."
      operationId: getOrCreateSubmissionDraft
      parameters:
      - name: accNo
        in: path
        description: Submission accNo
        required: true
        schema:
          type: string
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "415":
          description: Unsupported Media Type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSubmissionDraft"
      security:
      - sessionToken: []
    put:
      tags:
      - Submission Drafts
      summary: Update Submission Draft
      description: Replace the content of the submission draft with the specified
        accNo.
      operationId: updateSubmissionDraft
      parameters:
      - name: accNo
        in: path
        description: Submission accNo
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "415":
          description: Unsupported Media Type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSubmissionDraft"
      security:
      - sessionToken: []
    delete:
      tags:
      - Submission Drafts
      summary: Delete Submission Draft
      description: Delete the submission draft with the specified accNo.
      operationId: deleteSubmissionDraft
      parameters:
      - name: accNo
        in: path
        description: Submission accNo
        required: true
        schema:
          type: string
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "415":
          description: Unsupported Media Type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "400":
          description: Bad Request
