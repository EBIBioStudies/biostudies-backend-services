components:
  schemas:
    ValidationNode:
      required:
      - level
      - message
      - subnodes
      type: object
      properties:
        level:
          type: string
          enum:
          - ERROR
        message:
          type: string
        subnodes:
          type: array
          items:
            $ref: "#/components/schemas/ValidationNode"
    ValidationTree:
      required:
      - log
      - status
      type: object
      properties:
        status:
          type: string
          enum:
          - FAIL
        log:
          $ref: "#/components/schemas/ValidationNode"
    ResponseSubmissionDraft:
      required:
      - content
      - displayKey
      - key
      - modificationTime
      - newSubmission
      type: object
      properties:
        key:
          type: string
          description: Draft accession number
          example: TMP_2024-09-21T10:12:00.002Z
        displayKey:
          type: string
          description: Human-readable identifier for the draft
          example: S-BSST123
        newSubmission:
          type: boolean
          description: "True if the draft is for a new submission, false if it edits\
            \ an existing one"
        content:
          type: string
          description: Raw page-tab JSON content of the draft
          example: "{\"type\":\"Submission\",\"section\":{\"type\":\"Study\"}}"
        modificationTime:
          type: string
          description: Last modification time
          format: date-time
          example: 2024-09-21T10:12:00.002Z
      description: Submission draft summary.
    OnBehalfParameters:
      required:
      - userEmail
      type: object
      properties:
        userEmail:
          type: string
        userName:
          type: string
        register:
          type: boolean
    SubmitAttribute:
      required:
      - name
      - value
      type: object
      properties:
        name:
          type: string
        value:
          type: string
    SubmitParameters:
      required:
      - attributes
      - preferredSources
      type: object
      properties:
        preferredSources:
          type: array
          items:
            type: string
            enum:
            - SUBMISSION
            - USER_SPACE
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/SubmitAttribute"
        storageMode:
          type: string
          enum:
          - FIRE
          - NFS
        silentMode:
          type: boolean
        singleJobMode:
          type: boolean
    Attribute:
      required:
      - name
      - nameAttrs
      - reference
      - valueAttrs
      type: object
      properties:
        name:
          type: string
        value:
          type: string
        reference:
          type: boolean
        nameAttrs:
          type: array
          items:
            $ref: "#/components/schemas/AttributeDetail"
        valueAttrs:
          type: array
          items:
            $ref: "#/components/schemas/AttributeDetail"
    AttributeDetail:
      required:
      - name
      type: object
      properties:
        name:
          type: string
        value:
          type: string
    EitherBioFileFilesTable:
      required:
      - isLeft
      - isRight
      type: object
      properties:
        isLeft:
          type: boolean
        isRight:
          type: boolean
    EitherLinkLinksTable:
      required:
      - isLeft
      - isRight
      type: object
      properties:
        isLeft:
          type: boolean
        isRight:
          type: boolean
    EitherSectionSectionsTable:
      required:
      - isLeft
      - isRight
      type: object
      properties:
        isLeft:
          type: boolean
        isRight:
          type: boolean
    FileList:
      required:
      - file
      - name
      type: object
      properties:
        name:
          type: string
        file:
          type: string
          format: binary
    Left:
      required:
      - a
      - isLeft
      - isRight
      - value
      type: object
      allOf:
      - $ref: "#/components/schemas/EitherSectionSectionsTable"
      - type: object
        properties:
          value:
            type: object
          a:
            type: object
      - $ref: "#/components/schemas/EitherBioFileFilesTable"
      - $ref: "#/components/schemas/EitherLinkLinksTable"
      - $ref: "#/components/schemas/EitherExtSectionExtSectionTable"
      - $ref: "#/components/schemas/EitherExtFileExtFileTable"
      - $ref: "#/components/schemas/EitherExtLinkExtLinkTable"
    LinkList:
      required:
      - file
      - name
      type: object
      properties:
        name:
          type: string
        file:
          type: string
          format: binary
    PairStringString:
      required:
      - first
      - second
      type: object
      properties:
        first:
          type: string
        second:
          type: string
    Right:
      required:
      - b
      - isLeft
      - isRight
      - value
      type: object
      allOf:
      - $ref: "#/components/schemas/EitherSectionSectionsTable"
      - type: object
        properties:
          value:
            type: object
          b:
            type: object
      - $ref: "#/components/schemas/EitherBioFileFilesTable"
      - $ref: "#/components/schemas/EitherLinkLinksTable"
      - $ref: "#/components/schemas/EitherExtSectionExtSectionTable"
      - $ref: "#/components/schemas/EitherExtFileExtFileTable"
      - $ref: "#/components/schemas/EitherExtLinkExtLinkTable"
    Section:
