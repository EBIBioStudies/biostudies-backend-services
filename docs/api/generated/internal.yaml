        submissionTime:
          type: string
          format: date-time
        modificationTime:
          type: string
          format: date-time
        creationTime:
          type: string
          format: date-time
        section:
          $ref: "#/components/schemas/ExtSection"
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/ExtAttribute"
        tags:
