      properties:
        type:
          type: string
        accNo:
          type: string
        fileList:
          $ref: "#/components/schemas/FileList"
        linkList:
          $ref: "#/components/schemas/LinkList"
        sections:
          type: array
          items:
            oneOf:
            - $ref: "#/components/schemas/Left"
            - $ref: "#/components/schemas/Right"
        files:
          type: array
          items:
            oneOf:
            - $ref: "#/components/schemas/Left"
            - $ref: "#/components/schemas/Right"
        links:
          type: array
          items:
            oneOf:
            - $ref: "#/components/schemas/Left"
            - $ref: "#/components/schemas/Right"
        parentAccNo:
          type: string
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/Attribute"
    Submission:
      required:
      - accNo
      - attributes
      - section
      - tags
      type: object
      properties:
        accNo:
          type: string
        section:
          $ref: "#/components/schemas/Section"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/PairStringString"
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/Attribute"
    Unit:
      type: object
    EitherExtFileExtFileTable:
      required:
      - isLeft
      - isRight
      type: object
      properties:
        isLeft:
          type: boolean
        isRight:
          type: boolean
    EitherExtLinkExtLinkTable:
      required:
      - isLeft
      - isRight
      type: object
      properties:
        isLeft:
          type: boolean
        isRight:
          type: boolean
    EitherExtSectionExtSectionTable:
      required:
      - isLeft
