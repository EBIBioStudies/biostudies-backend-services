      security:
      - sessionToken: []
  /submissions/fileLists/validate:
    post:
      tags:
      - File Lists
      summary: Validate File List
      description: Validate a file list against the files available to the current
        user or the requested on-behalf user. Use this before submitting PageTab content
        that references an uploaded file list.
      operationId: validateFileList
      parameters:
      - name: accNo
        in: query
        required: false
        schema:
          type: string
      - name: rootPath
        in: query
        required: false
        schema:
          type: string
      - name: fileListName
        in: query
        required: true
        schema:
          type: string
      - name: onBehalf
        in: query
        description: Email of the user the submission is performed on behalf of.
        required: false
        schema:
          type: string
      - name: name
        in: query
        description: Name to use if the on-behalf user needs to be registered.
        required: false
        schema:
          type: string
      - name: register
        in: query
        description: Whether to register an inactive user for the on-behalf email.
        required: false
        schema:
          type: boolean
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
