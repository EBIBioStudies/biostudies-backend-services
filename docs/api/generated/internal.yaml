openapi: 3.0.1
info:
  title: BioStudies API
  description: "BioStudies submission backend. The `internal` group documents every\
    \ endpoint (operational tooling, refresh, FTP, releaser). The `public` group is\
    \ the subset intended for external submitters."
  version: 1.0.0
servers:
- url: http://biostudies-prod.ebi.ac.uk:8788
  description: PROD
- url: http://biostudies-beta.ebi.ac.uk:8788
  description: BETA
- url: http://biostudies-dev.ebi.ac.uk:8788
  description: DEV
tags:
- name: Security
  description: "User registration, authentication and account management."
- name: Collections
  description: Collections the authenticated user can submit to or attach files under.
- name: Submissions
  description: Search submissions and retrieve released or user-visible submission
    content.
- name: Synchronous Submission
  description: Submit content and wait for validation and persistence to complete
    before returning.
- name: Asynchronous Submission
  description: Submit content for background validation and processing.
- name: Submission Drafts
  description: "Create, list, update and submit submission drafts."
- name: Submission Requests
  description: Track asynchronous submission processing requests and their validation
    results.
- name: Submission Utilities
  description: "Authenticated helper operations for validating, converting, and managing\
    \ submissions."
- name: File Lists
  description: Validation helpers for submission file-list metadata before submission.
- name: User Files
  description: Browse and manage files in the authenticated user's submission workspace.
- name: Group Files
  description: Browse and manage files in workspaces shared through security groups.
- name: Groups
  description: Browse and administer security groups used for shared submission workspaces.
- name: Permissions
  description: Administrative access-control operations for submission permissions.
- name: Extended Submissions
  description: "Query extended submission documents, file lists, and link lists."
- name: Extended Submission Operations
  description: Operational actions for extended submissions and backend maintenance
    workflows.
- name: Post Processing
  description: Run post-processing tasks that enrich extended submissions after ingest.
- name: User Administration
  description: Internal user inspection and home-folder maintenance operations.
- name: Cluster Operations
  description: "Internal cluster job submission, status and log operations."
- name: Administration
  description: Internal maintenance jobs for submission request files and temporary
    storage.
- name: PMC Links
  description: Internal processing endpoints for loading Europe PMC links onto submissions.
- name: Statistics
  description: Submission statistics lookup and ingestion operations.
- name: Statistics Reports
  description: Read generated public report files for submission counts and storage
    sizes.
paths:
  /submissions/drafts/{accNo}:
    get:
      tags:
      - Submission Drafts
      summary: Get Submission Draft
      description: "Get the submission draft with the specified accNo, creating one\
        \ if it does not exist."
      operationId: getOrCreateSubmissionDraft
      parameters:
      - name: accNo
        in: path
        description: Submission accNo
        required: true
        schema:
          type: string
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "415":
          description: Unsupported Media Type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSubmissionDraft"
      security:
      - sessionToken: []
    put:
      tags:
      - Submission Drafts
      summary: Update Submission Draft
      description: Replace the content of the submission draft with the specified
        accNo.
      operationId: updateSubmissionDraft
      parameters:
      - name: accNo
        in: path
        description: Submission accNo
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "415":
          description: Unsupported Media Type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSubmissionDraft"
      security:
      - sessionToken: []
    delete:
      tags:
      - Submission Drafts
      summary: Delete Submission Draft
      description: Delete the submission draft with the specified accNo.
      operationId: deleteSubmissionDraft
      parameters:
      - name: accNo
        in: path
        description: Submission accNo
        required: true
        schema:
          type: string
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "415":
          description: Unsupported Media Type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ValidationTree"
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"
      security:
      - sessionToken: []
  /permissions:
