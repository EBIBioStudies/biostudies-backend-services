      properties:
        userEmail:
          type: string
          description: The email to validate
          example: user@test.org
        userName:
          type: string
          description: Name used to create the user if it doesn't exist
          example: Test User
    ActivateByEmailRequest:
      required:
      - email
      - instanceKey
      - path
      type: object
      properties:
        email:
          type: string
          description: User email
          example: user@test.org
        instanceKey:
          type: string
          description: Instance key that should process the password reset
          example: the-instance-key
        path:
          type: string
          description: Path to redirect the user in the UI
          example: /users/password_setup
    SubmissionFilterRequest:
      required:
      - limit
      - offset
      type: object
      properties:
        accNo:
          type: string
        limit:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
    SubmissionDto:
      required:
      - accno
      - displayAccNo
      - errors
      - mtime
      - newSubmission
      - status
      - title
      type: object
      properties:
        accno:
          type: string
        displayAccNo:
          type: string
        newSubmission:
          type: boolean
        title:
          type: string
        mtime:
          type: string
          format: date-time
        rtime:
          type: string
          format: date-time
        status:
          type: string
        errors:
          type: array
          items:
            type: string
    SubmissionRequest:
      required:
      - accNo
      - creationTime
      - errors
      - files
      - modificationTime
      - newSubmission
      - owner
      - preferredSources
      - status
      - version
      type: object
      properties:
        accNo:
          type: string
        version:
          type: integer
          format: int32
        owner:
          type: string
        draft:
          type: string
        status:
          type: string
          enum:
          - DRAFT
          - SUBMITTED
          - REQUESTED
          - FILES_VALIDATED
          - INDEXED
          - LOADED
          - INDEXED_CLEANED
          - VALIDATED
          - CLEANED
          - FILES_COPIED
          - CHECK_RELEASED
          - PERSISTED
          - PROCESSED
          - POST_PROCESSED
          - INVALID
        modificationTime:
          type: string
          format: date-time
        creationTime:
          type: string
          format: date-time
        newSubmission:
          type: boolean
        files:
          type: array
          items:
            type: string
            format: binary
        preferredSources:
          type: array
          items:
            type: string
            enum:
            - SUBMISSION
            - USER_SPACE
        onBehalfUser:
          type: string
        errors:
          type: array
          items:
            type: string
        process:
          $ref: "#/components/schemas/SubmissionRequestProcessing"
    SubmissionRequestFileChanges:
      required:
      - conflictingFiles
      - conflictingPageTab
      - deprecatedFiles
      - deprecatedPageTab
      - reusedFiles
      type: object
      properties:
        reusedFiles:
          type: integer
          format: int32
        deprecatedFiles:
          type: integer
          format: int32
        deprecatedPageTab:
          type: integer
          format: int32
        conflictingFiles:
          type: integer
          format: int32
        conflictingPageTab:
          type: integer
          format: int32
    SubmissionRequestProcessing:
      required:
      - currentIndex
      - fileChanges
      - notifyTo
      - silentMode
      - singleJobMode
      - statusChanges
      - submission
      - totalFiles
      type: object
      properties:
        submission:
          $ref: "#/components/schemas/ExtSubmission"
        notifyTo:
          type: string
        totalFiles:
          type: integer
          format: int32
        fileChanges:
          $ref: "#/components/schemas/SubmissionRequestFileChanges"
        currentIndex:
          type: integer
          format: int32
        silentMode:
          type: boolean
        singleJobMode:
          type: boolean
        previousVersion:
          type: integer
          format: int32
        statusChanges:
          type: array
          items:
            $ref: "#/components/schemas/SubmissionRequestStatusChange"
    SubmissionRequestStatusChange:
      required:
      - status
      type: object
      properties:
        status:
          type: string
    ExtSubPageRequest:
      required:
      - limit
      - offset
      type: object
      properties:
        fromRTime:
          type: string
        toRTime:
          type: string
        released:
          type: boolean
        collection:
          type: string
        offset:
          type: integer
          format: int64
        limit:
          type: integer
          format: int32
    WebExtPageExtSubmission:
      required:
      - content
      - limit
      - offset
      - totalElements
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ExtSubmission"
        totalElements:
          type: integer
          format: int64
        limit:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
        next:
          type: string
        previous:
          type: string
    ExtPageRequest:
      required:
      - limit
      - offset
      type: object
      properties:
        offset:
          type: integer
          format: int64
        limit:
          type: integer
          format: int32
    WebExtPageExtLink:
      required:
      - content
      - limit
      - offset
      - totalElements
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ExtLink"
        totalElements:
          type: integer
          format: int64
        limit:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
        next:
          type: string
        previous:
          type: string
    WebExtPageExtFile:
      required:
      - content
      - limit
      - offset
      - totalElements
      type: object
      properties:
        content:
          type: array
          items:
            oneOf:
            - $ref: "#/components/schemas/PersistedExtFile"
            - $ref: "#/components/schemas/RequestFile"
            - $ref: "#/components/schemas/FireFile"
            - $ref: "#/components/schemas/NfsFile"
        totalElements:
          type: integer
          format: int64
        limit:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
        next:
          type: string
        previous:
          type: string
    PageRequest:
      required:
      - limit
      - offset
      - pageNumber
      type: object
      properties:
        limit:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
        pageNumber:
          type: integer
          format: int32
    SubmissionStat:
      required:
      - accNo
      - type
      - value
      type: object
      properties:
        accNo:
          type: string
        value:
          type: integer
          format: int64
        type:
          type: string
    FolderStats:
      required:
      - lastModification
      - totalDirectories
      - totalFiles
      - totalFilesSize
      type: object
      properties:
        totalFiles:
          type: integer
          format: int32
        totalDirectories:
          type: integer
          format: int32
        totalFilesSize:
          type: integer
          format: int64
        lastModification:
          type: string
          format: date-time
    ExtUser:
      required:
      - email
      - fullName
      - notificationsEnabled
      type: object
      properties:
        email:
          type: string
        fullName:
          type: string
        login:
          type: string
        notificationsEnabled:
          type: boolean
    Group:
      required:
      - name
      type: object
      properties:
        name:
          type: string
        description:
          type: string
    Collection:
      required:
      - accno
      type: object
      properties:
        accno:
          type: string
        title:
          type: string
    JobStatus:
      required:
      - status
      type: object
      properties:
        status:
          type: string
  securitySchemes:
    sessionToken:
      type: apiKey
      description: Session token issued by `POST /auth/login` as `sessid`.
      name: X-Session-Token
      in: header
