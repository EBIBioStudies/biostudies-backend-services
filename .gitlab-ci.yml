image: gradle:8.7-jdk17
services:
  - docker:28.5.2-dind
variables:
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

include:
  - local: '/ci/docker.yml'
  - local: '/ci/jobs.yml'

stages:
  - build-test
  - verify-openapi
  - nfs-itest
  - fire-itest
  - fire-caos-itest
  - auto-deploy-dev
  - auto-deploy-beta
  - auto-deploy-prod
  - deploy-dev
  - deploy-beta
  - deploy-prod
  - build-fat-jar
  - build-push-docker-image

build-test:
  stage: build-test
  script: gradle build test -x itest -x jacocoTestCoverageVerification

verify-openapi:
  needs: [ "build-test" ]
  stage: verify-openapi
  script:
    # Regenerate the OpenAPI specs from the annotated code (boots the app under the
    # `openapi-gen` Spring profile, hits /v3/api-docs.yaml/{internal,public}, writes YAML to
    # docs/api/generated/) and fail if the committed baseline drifts from the result.
    - gradle :submission:submission-webapp:generateOpenApiDocs
    - git diff --exit-code -- docs/api/generated/internal.yaml docs/api/generated/public.yaml ||
      (echo "OpenAPI baseline drifted — commit the regenerated docs/api/generated/*.yaml" && exit 1)
  artifacts:
    when: on_failure
    paths:
      - docs/api/generated/internal.yaml
      - docs/api/generated/public.yaml

nfs-itest:
  needs: [ "build-test" ]
  stage: nfs-itest
  script:
    - apt-get update && apt-get install -y rsync
    - gradle :submission:submission-webapp:itest -PenableFire=false --rerun-tasks

fire-itest:
  needs: [ "nfs-itest" ]
  stage: fire-itest
  script:
    - apt-get update && apt-get install -y rsync
    - gradle :submission:submission-webapp:itest -PenableFire=true --rerun-tasks
  variables:
    ITEST_FIXED_DELAY: "50"

fire-caos-itest:
  needs: [ "fire-itest" ]
  stage: fire-caos-itest
  script:
    - apt-get update && apt-get install -y rsync
    - gradle :submission:submission-webapp:itest -PenableFire=true --rerun-tasks
  variables:
    ITEST_FAIL_FACTOR: "8"
